<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <defs>
    <linearGradient id="ef-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f3fc"/>
      <stop offset="100%" stop-color="#ffe8f0"/>
    </linearGradient>
  </defs>
  <rect width="200" height="160" rx="20" fill="url(#ef-sky)"/>
  <!-- waving character -->
  <circle cx="100" cy="80" r="28" fill="#fff5e0" stroke="#d04878" stroke-width="2"/>
  <path d="M75 65 Q100 55 125 65 Q120 78 100 75 Q85 77 75 65 Z" fill="#d04878"/>
  <circle cx="90" cy="80" r="2.5" fill="#2d4f6a"/>
  <circle cx="110" cy="80" r="2.5" fill="#2d4f6a"/>
  <path d="M92 92 Q100 98 108 92" stroke="#d04878" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="82" cy="88" r="3" fill="#ff8eae" opacity="0.5"/>
  <circle cx="118" cy="88" r="3" fill="#ff8eae" opacity="0.5"/>
  <!-- body -->
  <ellipse cx="100" cy="130" rx="22" ry="18" fill="#ff8eae" stroke="#d04878" stroke-width="2"/>
  <!-- waving hand -->
  <circle cx="135" cy="95" r="8" fill="#fff5e0" stroke="#d04878" stroke-width="1.5"/>
  <!-- sparkles -->
  <text x="30" y="40" font-size="20" fill="#ffd447" opacity="0.8">✦</text>
  <text x="160" y="50" font-size="18" fill="#ff8eae" opacity="0.8">♥</text>
  <text x="25" y="120" font-size="16" fill="#8fcff5" opacity="0.75">✦</text>
</svg>
