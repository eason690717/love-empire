<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <defs>
    <linearGradient id="em-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5e0"/>
      <stop offset="100%" stop-color="#e7f4d5"/>
    </linearGradient>
  </defs>
  <rect width="200" height="160" rx="20" fill="url(#em-bg)"/>
  <!-- scroll -->
  <rect x="55" y="40" width="90" height="80" rx="8" fill="#ffffff" stroke="#d4a574" stroke-width="2"/>
  <line x1="70" y1="60" x2="130" y2="60" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="70" y1="75" x2="120" y2="75" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="70" y1="90" x2="125" y2="90" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="70" y1="105" x2="110" y2="105" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round"/>
  <!-- quill -->
  <g transform="translate(130, 95)">
    <line x1="0" y1="20" x2="18" y2="0" stroke="#c98522" stroke-width="2" stroke-linecap="round"/>
    <path d="M18 0 Q22 -4 24 -2 Q22 2 18 0 Z" fill="#ffd447" stroke="#c98522" stroke-width="1"/>
  </g>
  <!-- sparkles -->
  <text x="30" y="45" font-size="18" fill="#ffd447" opacity="0.9">✦</text>
  <text x="165" y="70" font-size="16" fill="#ff8eae" opacity="0.8">♥</text>
  <text x="40" y="135" font-size="14" fill="#8fcff5" opacity="0.75">✧</text>
</svg>
