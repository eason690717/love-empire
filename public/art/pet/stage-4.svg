<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="myth-body" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#fff5e0"/>
      <stop offset="70%" stop-color="#ffd447"/>
      <stop offset="100%" stop-color="#ff8eae"/>
    </radialGradient>
    <radialGradient id="myth-wing" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#ffd447" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffb8de" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="myth-aura" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ffd447" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#ffb8de" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#b8d8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="myth-halo-ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd447"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffd447"/>
    </linearGradient>
    <filter id="myth-shadow" x="-30%" y="-20%" width="160%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#ff8eae" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- divine aura -->
  <circle cx="100" cy="105" r="98" fill="url(#myth-aura)"/>
  <circle cx="100" cy="105" r="80" fill="url(#myth-aura)" opacity="0.7"/>
  <!-- halo ring above head -->
  <ellipse cx="100" cy="22" rx="34" ry="6" fill="none" stroke="url(#myth-halo-ring)" stroke-width="4" opacity="0.9"/>
  <ellipse cx="100" cy="22" rx="28" ry="4" fill="none" stroke="#ffd447" stroke-width="1.5" opacity="0.7"/>
  <!-- shadow -->
  <ellipse cx="100" cy="182" rx="55" ry="6" fill="#1a3a56" opacity="0.25"/>
  <!-- six feather wings -->
  <path d="M35 80 Q-5 55 10 105 Q30 115 48 95 Z" fill="url(#myth-wing)" stroke="#ffb547" stroke-width="2"/>
  <path d="M42 115 Q8 100 15 145 Q38 145 55 122 Z" fill="url(#myth-wing)" stroke="#ffb547" stroke-width="2" opacity="0.85"/>
  <path d="M165 80 Q205 55 190 105 Q170 115 152 95 Z" fill="url(#myth-wing)" stroke="#ffb547" stroke-width="2"/>
  <path d="M158 115 Q192 100 185 145 Q162 145 145 122 Z" fill="url(#myth-wing)" stroke="#ffb547" stroke-width="2" opacity="0.85"/>
  <!-- tail plume -->
  <path d="M150 140 Q190 135 195 90 Q170 125 155 135" fill="url(#myth-body)" stroke="#ff8eae" stroke-width="2"/>
  <path d="M188 92 Q196 82 200 96 Q190 98 188 92 Z" fill="#ffd447" stroke="#c98522" stroke-width="1.5"/>
  <!-- body -->
  <ellipse cx="100" cy="112" rx="50" ry="54" fill="url(#myth-body)" stroke="#d04878" stroke-width="2.5" filter="url(#myth-shadow)"/>
  <!-- belly -->
  <ellipse cx="100" cy="125" rx="27" ry="25" fill="#ffffff" opacity="0.9"/>
  <!-- crown on forehead -->
  <path d="M100 48 L88 28 L94 38 L100 25 L106 38 L112 28 Z" fill="#ffd447" stroke="#c98522" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="100" cy="34" r="2.5" fill="#ff8eae"/>
  <!-- ears -->
  <path d="M64 70 Q56 36 78 58 Q82 74 70 80 Z" fill="url(#myth-body)" stroke="#d04878" stroke-width="2"/>
  <path d="M136 70 Q144 36 122 58 Q118 74 130 80 Z" fill="url(#myth-body)" stroke="#d04878" stroke-width="2"/>
  <!-- eyes (starry) -->
  <ellipse cx="82" cy="105" rx="6.5" ry="9" fill="#2d4f6a"/>
  <ellipse cx="118" cy="105" rx="6.5" ry="9" fill="#2d4f6a"/>
  <circle cx="85" cy="102" r="3.2" fill="white"/>
  <circle cx="121" cy="102" r="3.2" fill="white"/>
  <polygon points="82,100 83,103 86,103 83.5,105 84.5,108 82,106.5 79.5,108 80.5,105 78,103 81,103" fill="#ffd447" transform="scale(0.5) translate(82, 100)"/>
  <!-- cheek -->
  <circle cx="68" cy="128" r="10" fill="#ff8eae" opacity="0.6"/>
  <circle cx="132" cy="128" r="10" fill="#ff8eae" opacity="0.6"/>
  <!-- smile -->
  <path d="M84 133 Q100 146 116 133" stroke="#2d4f6a" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- floating sparkles -->
  <text x="18" y="45" font-size="22" opacity="0.95" fill="#ffd447">✦</text>
  <text x="170" y="50" font-size="20" opacity="0.9" fill="#ffd447">✦</text>
  <text x="35" y="155" font-size="18" opacity="0.85" fill="#ff8eae">✧</text>
  <text x="160" y="162" font-size="18" opacity="0.85" fill="#8fcff5">✧</text>
  <text x="92" y="175" font-size="14" opacity="0.8" fill="#ffd447">⋆</text>
</svg>
