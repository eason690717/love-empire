<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="hatch-body" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#ffe8f0"/>
      <stop offset="100%" stop-color="#ffb4cf"/>
    </radialGradient>
    <radialGradient id="hatch-shell" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fff5e0"/>
      <stop offset="100%" stop-color="#ffd8b8"/>
    </radialGradient>
    <filter id="hatch-shadow" x="-30%" y="-20%" width="160%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="3.5" flood-color="#1a3a56" flood-opacity="0.28"/>
    </filter>
  </defs>
  <!-- ground shadow -->
  <ellipse cx="100" cy="180" rx="50" ry="6" fill="#1a3a56" opacity="0.16"/>
  <!-- lower shell -->
  <path d="M48 150 Q50 125 70 130 L80 120 L95 132 L115 122 L130 133 L150 127 Q152 155 130 175 Q100 185 70 175 Q50 170 48 150 Z"
        fill="url(#hatch-shell)" stroke="#d4a574" stroke-width="2"/>
  <!-- baby body -->
  <ellipse cx="100" cy="100" rx="52" ry="56" fill="url(#hatch-body)" stroke="#d04878" stroke-width="2.5" filter="url(#hatch-shadow)"/>
  <!-- cheek blush -->
  <circle cx="72" cy="115" r="10" fill="#ff8eae" opacity="0.45"/>
  <circle cx="128" cy="115" r="10" fill="#ff8eae" opacity="0.45"/>
  <!-- eyes -->
  <ellipse cx="82" cy="95" rx="5.5" ry="7" fill="#2d4f6a"/>
  <ellipse cx="118" cy="95" rx="5.5" ry="7" fill="#2d4f6a"/>
  <circle cx="84" cy="92" r="2" fill="white"/>
  <circle cx="120" cy="92" r="2" fill="white"/>
  <!-- smile -->
  <path d="M88 120 Q100 128 112 120" stroke="#d04878" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- tuft -->
  <path d="M100 48 Q92 32 96 50 Q100 38 104 50 Q108 32 100 48 Z" fill="#ffd447" stroke="#c98522" stroke-width="1.5"/>
  <!-- sparkle -->
  <text x="40" y="50" font-size="16" opacity="0.8">✦</text>
  <text x="160" y="60" font-size="14" opacity="0.7">✦</text>
</svg>
