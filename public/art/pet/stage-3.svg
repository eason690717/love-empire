<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="legend-body" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ffe8f0"/>
      <stop offset="100%" stop-color="#d280ff"/>
    </radialGradient>
    <radialGradient id="legend-wing" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ffb8de" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b8d8ff" stop-opacity="0.7"/>
    </radialGradient>
    <radialGradient id="legend-halo" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ffd447" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffd447" stop-opacity="0"/>
    </radialGradient>
    <filter id="legend-shadow" x="-30%" y="-20%" width="160%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#d04878" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- aura -->
  <circle cx="100" cy="105" r="90" fill="url(#legend-halo)"/>
  <!-- shadow -->
  <ellipse cx="100" cy="182" rx="55" ry="6" fill="#1a3a56" opacity="0.22"/>
  <!-- wings back -->
  <path d="M40 90 Q5 60 20 115 Q35 120 52 100 Z" fill="url(#legend-wing)" stroke="#d280ff" stroke-width="2"/>
  <path d="M160 90 Q195 60 180 115 Q165 120 148 100 Z" fill="url(#legend-wing)" stroke="#d280ff" stroke-width="2"/>
  <!-- tail -->
  <path d="M150 140 Q185 130 182 85 Q172 120 160 135" fill="#d280ff" stroke="#a84fd3" stroke-width="2"/>
  <path d="M178 90 Q184 82 186 95 Q178 95 178 90 Z" fill="#ffd447" stroke="#c98522" stroke-width="1.5"/>
  <!-- body -->
  <ellipse cx="100" cy="112" rx="52" ry="55" fill="url(#legend-body)" stroke="#a84fd3" stroke-width="2.5" filter="url(#legend-shadow)"/>
  <!-- belly -->
  <ellipse cx="100" cy="125" rx="28" ry="26" fill="#fff5e0" opacity="0.85"/>
  <!-- horn -->
  <path d="M100 48 L92 22 L100 32 L108 22 Z" fill="#ffd447" stroke="#c98522" stroke-width="2" stroke-linejoin="round"/>
  <!-- ears -->
  <path d="M66 68 Q60 38 78 58 Q80 72 70 78 Z" fill="#d280ff" stroke="#a84fd3" stroke-width="2"/>
  <path d="M134 68 Q140 38 122 58 Q120 72 130 78 Z" fill="#d280ff" stroke="#a84fd3" stroke-width="2"/>
  <!-- eyes (legendary sparkle) -->
  <ellipse cx="82" cy="105" rx="6" ry="8" fill="#2d4f6a"/>
  <ellipse cx="118" cy="105" rx="6" ry="8" fill="#2d4f6a"/>
  <circle cx="85" cy="102" r="3" fill="white"/>
  <circle cx="121" cy="102" r="3" fill="white"/>
  <circle cx="80" cy="108" r="1" fill="white"/>
  <circle cx="116" cy="108" r="1" fill="white"/>
  <!-- cheek glow -->
  <circle cx="70" cy="128" r="9" fill="#ff8eae" opacity="0.55"/>
  <circle cx="130" cy="128" r="9" fill="#ff8eae" opacity="0.55"/>
  <!-- smile -->
  <path d="M86 132 Q100 143 114 132" stroke="#2d4f6a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- sparkles -->
  <text x="25" y="50" font-size="20" opacity="0.9" fill="#ffd447">✦</text>
  <text x="170" y="58" font-size="18" opacity="0.85" fill="#ffd447">✦</text>
  <text x="45" y="160" font-size="16" opacity="0.8" fill="#ff8eae">✧</text>
  <text x="155" y="170" font-size="16" opacity="0.8" fill="#8fcff5">✧</text>
</svg>
