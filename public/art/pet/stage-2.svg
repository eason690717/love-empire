<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="grown-body" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#e6f3fc"/>
      <stop offset="100%" stop-color="#8fcff5"/>
    </radialGradient>
    <radialGradient id="grown-belly" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fff5e0"/>
      <stop offset="100%" stop-color="#ffd8b8"/>
    </radialGradient>
    <filter id="grown-shadow" x="-30%" y="-20%" width="160%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#1a3a56" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- shadow -->
  <ellipse cx="100" cy="182" rx="52" ry="6" fill="#1a3a56" opacity="0.18"/>
  <!-- tail -->
  <path d="M150 135 Q175 120 172 90 Q168 115 158 125" fill="#8fcff5" stroke="#3680e0" stroke-width="2"/>
  <!-- body -->
  <ellipse cx="100" cy="112" rx="55" ry="58" fill="url(#grown-body)" stroke="#3680e0" stroke-width="2.5" filter="url(#grown-shadow)"/>
  <!-- belly -->
  <ellipse cx="100" cy="125" rx="32" ry="30" fill="url(#grown-belly)"/>
  <!-- ears -->
  <path d="M58 70 Q50 40 70 55 Q72 68 62 76 Z" fill="#8fcff5" stroke="#3680e0" stroke-width="2"/>
  <path d="M142 70 Q150 40 130 55 Q128 68 138 76 Z" fill="#8fcff5" stroke="#3680e0" stroke-width="2"/>
  <path d="M60 60 Q58 50 68 58 Q66 65 62 68 Z" fill="#ffb4cf"/>
  <path d="M140 60 Q142 50 132 58 Q134 65 138 68 Z" fill="#ffb4cf"/>
  <!-- cheek -->
  <circle cx="70" cy="125" r="10" fill="#ff8eae" opacity="0.55"/>
  <circle cx="130" cy="125" r="10" fill="#ff8eae" opacity="0.55"/>
  <!-- eyes -->
  <ellipse cx="82" cy="102" rx="6" ry="8" fill="#2d4f6a"/>
  <ellipse cx="118" cy="102" rx="6" ry="8" fill="#2d4f6a"/>
  <circle cx="85" cy="99" r="2.5" fill="white"/>
  <circle cx="121" cy="99" r="2.5" fill="white"/>
  <!-- smile -->
  <path d="M86 130 Q100 140 114 130" stroke="#2d4f6a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- feet -->
  <ellipse cx="82" cy="168" rx="10" ry="5" fill="#3680e0"/>
  <ellipse cx="118" cy="168" rx="10" ry="5" fill="#3680e0"/>
  <!-- sparkle -->
  <text x="42" y="48" font-size="16" opacity="0.75">✦</text>
  <text x="162" y="150" font-size="14" opacity="0.7">✦</text>
</svg>
