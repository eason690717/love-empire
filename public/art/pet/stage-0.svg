<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="egg-body" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#fff5e0"/>
      <stop offset="100%" stop-color="#ffd8b8"/>
    </radialGradient>
    <radialGradient id="egg-spot" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ff8eae"/>
      <stop offset="100%" stop-color="#ffb8de"/>
    </radialGradient>
    <filter id="egg-shadow" x="-30%" y="-20%" width="160%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#1a3a56" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- ground shadow -->
  <ellipse cx="100" cy="180" rx="46" ry="6" fill="#1a3a56" opacity="0.15"/>
  <!-- egg body -->
  <ellipse cx="100" cy="104" rx="58" ry="72" fill="url(#egg-body)" stroke="#d4a574" stroke-width="2.5" filter="url(#egg-shadow)"/>
  <!-- highlight -->
  <ellipse cx="80" cy="75" rx="18" ry="26" fill="#ffffff" opacity="0.55"/>
  <!-- spots -->
  <circle cx="130" cy="70" r="9" fill="url(#egg-spot)" opacity="0.9"/>
  <circle cx="75" cy="130" r="11" fill="url(#egg-spot)" opacity="0.85"/>
  <circle cx="120" cy="145" r="7" fill="url(#egg-spot)" opacity="0.8"/>
  <circle cx="150" cy="110" r="6" fill="url(#egg-spot)" opacity="0.75"/>
  <!-- tiny sparkles (Pikmin-ish sprouts) -->
  <text x="55" y="55" font-size="14" opacity="0.7">✦</text>
  <text x="150" y="170" font-size="12" opacity="0.6">✦</text>
</svg>
